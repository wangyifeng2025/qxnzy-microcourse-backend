version: '3.8'

services:
  db:
    image: postgres:18.3-trixie
    container_name: microcourse-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qxnzy_microcourse
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 挂载建表脚本，第一次启动时自动初始化表格
      - ./init-sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U micro_user -d qxnzy_microcourse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./qxnzy-microcourse-backend
    container_name: microcourse-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # 确保数据库不仅启动了，而且准备就绪了
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/qxnzy_microcourse
      - JWT_SECRET=change-this-in-production
      - JWT_EXPIRATION=86400
      - S3_ENDPOINT=https://s3.oss-cn-beijing.aliyuncs.com
      - S3_ACCESS_KEY=LTAI5tHDdQA473ghqKSrpKCF
      - S3_SECRET_KEY=Y4rAzmNVDZJUx93eOt6nHgBe9Zr625a
      - S3_BUCKET=qxnzy-course-video
      - S3_REGION=oss-cn-beijing
      # 路径风格寻址（true = 路径风格，推荐；false = 虚拟主机风格）
      # MinIO 必须为 true；阿里OSS需要虚拟主机风格
      - S3_FORCE_PATH_STYLE=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_REAL_NAME=系统管理员

  frontend:
    build:
      context: ./qxnzy-microcourse-frontend
    container_name: microcourse-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:1.28.3-alpine3.23
    container_name: microcourse-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend

volumes:
  pgdata: